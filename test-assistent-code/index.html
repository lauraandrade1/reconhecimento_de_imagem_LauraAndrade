<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Laura Andrade — Vision AI</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --bg:        #0a0a0f;
      --surface:   #13131c;
      --border:    #ffffff12;
      --accent:    #c8a96e;
      --accent2:   #e8c98e;
      --text:      #f0ede8;
      --muted:     #8a8680;
      --radius:    16px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Grain overlay ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* ── Header ── */
    header {
      position: relative;
      z-index: 1;
      padding: 3rem 1.5rem 2rem;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }

    .eyebrow {
      font-family: 'DM Sans', sans-serif;
      font-size: .7rem;
      font-weight: 500;
      letter-spacing: .25em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: .75rem;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.4rem, 6vw, 4.5rem);
      font-weight: 900;
      line-height: 1.05;
      letter-spacing: -.02em;
      background: linear-gradient(135deg, var(--accent2) 0%, var(--accent) 60%, #a07840 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: .95rem;
      color: var(--muted);
      margin-top: .75rem;
      font-weight: 300;
    }

    /* ── Main card ── */
    .card-glass {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
    }

    /* ── Start button ── */
    #btn-start {
      display: inline-flex;
      align-items: center;
      gap: .6rem;
      padding: .85rem 2.2rem;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      color: #0a0a0f;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: 1rem;
      letter-spacing: .04em;
      border: none;
      border-radius: 100px;
      cursor: pointer;
      transition: transform .2s, box-shadow .2s, opacity .2s;
      box-shadow: 0 4px 24px #c8a96e40;
    }

    #btn-start:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px #c8a96e55;
    }

    #btn-start:active:not(:disabled) { transform: translateY(0); }

    #btn-start:disabled {
      opacity: .45;
      cursor: not-allowed;
      box-shadow: none;
    }

    .btn-icon {
      width: 20px; height: 20px;
      fill: #0a0a0f;
    }

    /* ── Permission hint ── */
    #permission-hint {
      display: none;
      font-size: .82rem;
      color: var(--muted);
      margin-top: .6rem;
      text-align: center;
    }

    /* ── Webcam frame ── */
    #webcam-wrapper {
      display: none;
      justify-content: center;
    }

    #webcam-container {
      width: 100%;
      max-width: 300px;
      aspect-ratio: 1/1;
      border-radius: var(--radius);
      overflow: hidden;
      border: 2px solid var(--border);
      box-shadow: 0 0 40px #c8a96e18;
      background: #000;
    }

    #webcam-container canvas {
      width: 100% !important;
      height: 100% !important;
      display: block;
    }

    /* ── Labels / progress bars ── */
    #label-container {
      width: 100%;
    }

    .prediction-item {
      margin-bottom: 1.1rem;
    }

    .prediction-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: .45rem;
    }

    .prediction-name {
      font-size: .88rem;
      font-weight: 500;
      color: var(--text);
      letter-spacing: .02em;
    }

    .prediction-pct {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent);
      min-width: 3.5rem;
      text-align: right;
    }

    .bar-track {
      height: 8px;
      background: #ffffff0d;
      border-radius: 100px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 100px;
      transition: width .18s ease;
      background: linear-gradient(90deg, var(--accent) 0%, var(--accent2) 100%);
    }

    .bar-fill.high {
      background: linear-gradient(90deg, #6ee7b7 0%, #34d399 100%);
      box-shadow: 0 0 8px #34d39955;
    }

    /* ── Status badge ── */
    #status-badge {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      font-size: .75rem;
      font-weight: 500;
      letter-spacing: .08em;
      text-transform: uppercase;
      padding: .3rem .8rem;
      border-radius: 100px;
      border: 1px solid var(--border);
      color: var(--muted);
    }

    #status-badge .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted);
      transition: background .3s;
    }

    #status-badge.live .dot {
      background: #4ade80;
      box-shadow: 0 0 6px #4ade8099;
      animation: pulse 1.4s ease-in-out infinite;
    }

    #status-badge.live { color: #4ade80; border-color: #4ade8033; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .4; }
    }

    /* ── Loading spinner ── */
    #loading-overlay {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      padding: 1.5rem 0;
    }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      font-size: .85rem;
      color: var(--muted);
      letter-spacing: .05em;
    }

    /* ── Section divider ── */
    .section-label {
      font-size: .68rem;
      font-weight: 500;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: .75rem;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Footer ── */
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem 1rem;
      font-size: .78rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }

    footer span { color: var(--accent); }

    /* ── Responsive tweaks ── */
    @media (max-width: 576px) {
      .card-glass { padding: 1.25rem; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <p class="eyebrow">Teachable Machine</p>
    <h1>Laura Andrade</h1>
    <p class="subtitle">Reconhecimento de imagem em tempo real via webcam</p>
  </header>

  <!-- Main content -->
  <main class="container py-4 py-md-5" style="max-width:700px; position:relative; z-index:1;">
    <div class="card-glass">

      <!-- Status + Start -->
      <div class="d-flex flex-column flex-sm-row align-items-center justify-content-between gap-3 mb-4">
        <div id="status-badge">
          <span class="dot"></span>
          <span id="status-text">Aguardando</span>
        </div>

        <button id="btn-start" onclick="init()">
          <svg class="btn-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          Iniciar Câmera
        </button>
      </div>

      <p id="permission-hint">
        🔒 Será solicitada permissão de acesso à câmera do seu dispositivo.
      </p>

      <!-- Loading -->
      <div id="loading-overlay">
        <div class="spinner"></div>
        <p class="loading-text">Carregando modelo...</p>
      </div>

      <!-- Webcam -->
      <div id="webcam-wrapper" class="mb-4">
        <div id="webcam-container"></div>
      </div>

      <!-- Predictions -->
      <div id="predictions-section" style="display:none;">
        <p class="section-label">Classificação</p>
        <div id="label-container"></div>
      </div>

    </div>
  </main>

  <!-- Footer -->
  <footer>
    Desenvolvido por <span>Laura Andrade</span> &mdash; Powered by Teachable Machine &amp; TensorFlow.js
  </footer>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    const URL = "https://teachablemachine.withgoogle.com/models/Fv80YiRV8/";

    let model, webcam, labelContainer, maxPredictions;
    let started = false;

    const btnStart   = document.getElementById('btn-start');
    const statusBadge = document.getElementById('status-badge');
    const statusText  = document.getElementById('status-text');
    const loadingOverlay = document.getElementById('loading-overlay');
    const webcamWrapper  = document.getElementById('webcam-wrapper');
    const predictSection = document.getElementById('predictions-section');
    const permHint       = document.getElementById('permission-hint');

    function setStatus(state) {
      statusBadge.className = 'status-badge ' + (state === 'live' ? 'live' : '');
      const labels = { idle: 'Aguardando', loading: 'Carregando…', live: 'Ao vivo' };
      statusText.textContent = labels[state] || state;
    }

    async function init() {
      if (started) return;
      started = true;

      btnStart.disabled = true;
      permHint.style.display = 'block';
      loadingOverlay.style.display = 'flex';
      setStatus('loading');

      try {
        const modelURL    = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        model = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        const flip = true;
        webcam = new tmImage.Webcam(300, 300, flip);
        await webcam.setup();
        await webcam.play();
        window.requestAnimationFrame(loop);

        // Webcam
        document.getElementById("webcam-container").appendChild(webcam.canvas);
        webcamWrapper.style.display = 'flex';

        // Build label bars
        labelContainer = document.getElementById("label-container");
        labelContainer.innerHTML = '';
        for (let i = 0; i < maxPredictions; i++) {
          const item = document.createElement('div');
          item.className = 'prediction-item';
          item.innerHTML = `
            <div class="prediction-header">
              <span class="prediction-name" id="name-${i}">Classe ${i + 1}</span>
              <span class="prediction-pct" id="pct-${i}">0%</span>
            </div>
            <div class="bar-track">
              <div class="bar-fill" id="bar-${i}" style="width:0%"></div>
            </div>`;
          labelContainer.appendChild(item);
        }

        predictSection.style.display = 'block';
        loadingOverlay.style.display = 'none';
        permHint.style.display = 'none';
        setStatus('live');

      } catch (err) {
        console.error(err);
        loadingOverlay.innerHTML = `<p style="color:#f87171;font-size:.9rem;">Erro ao acessar a câmera ou carregar o modelo.</p>`;
        setStatus('idle');
        started = false;
        btnStart.disabled = false;
      }
    }

    async function loop() {
      webcam.update();
      await predict();
      window.requestAnimationFrame(loop);
    }

    async function predict() {
      const prediction = await model.predict(webcam.canvas);
      for (let i = 0; i < maxPredictions; i++) {
        const prob = prediction[i].probability;
        const pct  = Math.round(prob * 100);
        const name = prediction[i].className;

        const nameEl = document.getElementById(`name-${i}`);
        const pctEl  = document.getElementById(`pct-${i}`);
        const barEl  = document.getElementById(`bar-${i}`);

        if (nameEl) nameEl.textContent = name;
        if (pctEl)  pctEl.textContent  = pct + '%';
        if (barEl) {
          barEl.style.width = pct + '%';
          barEl.className = 'bar-fill' + (pct >= 70 ? ' high' : '');
        }
      }
    }
  </script>
</body>
</html>
